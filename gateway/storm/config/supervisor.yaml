storm.zookeeper.servers:
  - "zookeeper"

storm.zookeeper.port: 2181

nimbus.seeds: ["nimbus"]

storm.log.dir: "/logs"

storm.local.dir: "/data"

supervisor.slots.ports:
  - 6700
  - 6701
  - 6702
  - 6703

# May gateway co RAM co Raspberry Pi 3 (1GB) -> gioi han heap worker
# de supervisor + worker + OS khong vuot qua gioi han container
worker.heap.memory.mb: 512
supervisor.memory.capacity.mb: 1024