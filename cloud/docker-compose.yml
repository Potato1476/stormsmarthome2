# ============================================================================
# FOG v1 (code thầy + TagAwareScheduler) — TẦNG CLOUD, deploy trên EC2 x86_64
#
# Một Storm cluster DUY NHẤT trải trên 2 máy:
#   - Máy CLOUD (file này)   : zookeeper, nimbus+UI (TagAwareScheduler),
#                              supervisor2 (tags: cloud), mysql, storm-exporter
#   - Máy GATEWAY            : mqtt-broker + supervisor1 (untagged)
#                              → xem gateway/docker-compose.yaml
#
# Phân chia bolt (mặc định trong MainTopo, đổi bằng --cloudbolts khi submit):
#   gateway (untagged) : spout-data, spout-trigger, split-*, avg-*
#                        (việc nhẹ + cảnh báo thiết bị TỨC THÌ qua broker local)
#   cloud (tags=cloud) : sum-*, forecast-*  (tổng hợp house/household, dự báo)
#
# Cần file .env (xem .env.example): GATEWAY_PUBLIC_IP=<IP máy gateway>
#
# Chạy:  docker compose up -d
# Nộp topology (sau khi cả 2 máy đã up):
#   docker compose run --rm topo-submit
# ============================================================================

services:
  zookeeper:
    image: zookeeper:3.8.5
    container_name: zookeeper
    hostname: zookeeper
    networks:
      storm_network:
    volumes:
      - ./storm/config/zoo.cfg:/conf/zoo.cfg
    ports:
      - 2181:2181
    restart: always

  nimbus:
    image: storm:2.1.0
    container_name: nimbus
    hostname: nimbus
    command: sh -c "storm nimbus & storm ui"
    volumes:
      - ./storm/config/nimbus.yaml:/conf/storm.yaml
      - ../gateway/tagawarescheduler/target/tagawarescheduler-1.0.jar:/apache-storm-2.1.0/lib/tagawarescheduler-1.0.jar
      - ../gateway/target/Storm-IOTdata-1.0-SNAPSHOT-jar-with-dependencies.jar:/apache-storm-2.1.0/Storm-IOTdata-1.0-SNAPSHOT-jar-with-dependencies.jar
    ports:
      - 8080:8080   # Storm UI
      - 6627:6627   # Nimbus Thrift
    restart: always
    networks:
      storm_network:
    extra_hosts:
      - "supervisor1:${GATEWAY_PUBLIC_IP}"
      - "mqtt-broker:${GATEWAY_PUBLIC_IP}"
    depends_on:
      - zookeeper

  # Supervisor tầng cloud — TagAwareScheduler xếp các bolt có tags=cloud vào đây
  supervisor2:
    image: storm:2.1.0
    container_name: supervisor2
    hostname: supervisor2
    command: storm supervisor
    depends_on:
      - nimbus
      - zookeeper
    restart: always
    volumes:
      - ./storm/config/supervisor.yaml:/conf/storm.yaml
    ports:
      - 6700-6703:6700-6703
    extra_hosts:
      - "supervisor1:${GATEWAY_PUBLIC_IP}"
      - "mqtt-broker:${GATEWAY_PUBLIC_IP}"
    networks:
      storm_network:

  mysql:
    image: mysql:8.4.2
    container_name: mysql
    networks:
      storm_network:
    environment:
      MYSQL_ROOT_PASSWORD: Uet123
      MYSQL_DATABASE: iotdata
      MYSQL_USER: user1
      MYSQL_PASSWORD: Uet123
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pUet123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  # Nộp topology một lần rồi thoát. Đổi phân chia bolt bằng CLOUD_BOLTS,
  # ví dụ CLOUD_BOLTS="sum,forecast,avg-60,avg-120" docker compose run --rm topo-submit
  topo-submit:
    image: storm:2.1.0
    container_name: topo-submit
    profiles: ["submit"]
    networks:
      storm_network:
    volumes:
      - ./storm/config/nimbus.yaml:/conf/storm.yaml
      - ../gateway/target/Storm-IOTdata-1.0-SNAPSHOT-jar-with-dependencies.jar:/opt/topo.jar
    extra_hosts:
      - "mqtt-broker:${GATEWAY_PUBLIC_IP}"
    environment:
      CLOUD_BOLTS: ${CLOUD_BOLTS:-sum,forecast}
    command: >
      sh -c "
        storm jar /opt/topo.jar com.storm.iotdata.MainTopo -c \"$${CLOUD_BOLTS}\" &&
        echo '[submit] Topology iot-smarthome da duoc nop.'
      "
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  # Metrics cho Prometheus (cùng exporter với hệ Monolithic → so sánh công bằng)
  storm-exporter:
    image: mr4x2/stormexporter:v1.2.2
    container_name: storm-exporter
    networks:
      storm_network:
    environment:
      - STORM_UI_HOST=nimbus:8080
      - PORT_EXPOSE=8000
      - REFRESH_RATE=5
    ports:
      - 8000:8000
    depends_on:
      - nimbus
    restart: unless-stopped

networks:
  storm_network:
    driver: bridge

volumes:
  mysql_data:
