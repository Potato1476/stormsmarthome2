# Monitoring FOG v1 — chạy LOCAL trên laptop (laptop với tới được Cloud EC2,
# chiều ngược lại thì không vì NAT). storm-exporter chạy TRÊN máy cloud
# (cloud/docker-compose.yml) — Prometheus ở đây scrape <CLOUD_PUBLIC_IP>:8000.
#
# Trước khi chạy: thay placeholder trong prometheus/prometheus.yml:
#   sed -i '' "s/CLOUD_PUBLIC_IP/<ip thật>/" monitoring/prometheus/prometheus.yml
# Chạy:  docker compose up -d   →  Grafana http://localhost:3000 (admin/admin)
version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
