storm.zookeeper.servers:
  - "cloud-zookeeper"

storm.zookeeper.port: 2181

nimbus.seeds: ["cloud-nimbus"]

storm.log.dir: "/logs"

storm.local.dir: "/data"

supervisor.slots.ports:
  - 6700
  - 6701
  - 6702
  - 6703

# TagAwareScheduler metadata: route "cloud"-tagged bolts to this supervisor
supervisor.scheduler.meta:
  tags: "cloud,untagged"
